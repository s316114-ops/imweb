<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💜 BTS QUIZ - Interactive Quiz</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Background Canvas for Galaxy Particles -->
    <canvas id="particles-canvas"></canvas>
    <!-- Foreground Canvas for Confetti Celebration -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Header navigation -->
    <header class="quiz-header">
        <a href="../index.html" class="back-btn">← 回到主頁</a>

        <div class="sound-toggle-wrapper">
            <label class="sound-switch">
                <input type="checkbox" id="sound-toggle" checked>
                <span class="sound-slider"></span>
            </label>
            <span class="sound-label">🔊 系統音效</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="quiz-container">
        <!-- 1. Intro Page -->
        <section id="intro-page" class="quiz-card active">
            <span class="theme-tag">💜 Purple BTS Theme 💜</span>
            <h1 class="purple-glitch" data-text="BTS QUIZ">BTS QUIZ</h1>
            <p class="subtitle">防彈少年團知識挑戰賽<br>測驗你的阿米極限！(共 15 題，每題限時 15 秒)</p>

            <div class="action-row">
                <button id="start-btn" class="btn-quiz-primary">開始挑戰</button>
            </div>

            <!-- Leaderboard list inside intro -->
            <div class="leaderboard-section">
                <h3>🏆 阿米榮譽榜 (Top 5)</h3>
                <ol id="leaderboard-list">
                    <!-- Loaded dynamically -->
                </ol>
            </div>
        </section>

        <!-- 2. Quiz View -->
        <section id="quiz-view" class="quiz-card hidden">
            <div class="quiz-header-row">
                <span class="question-progress">第 <span id="current-question-num">1</span> / 15 題</span>
                <span class="running-score-tag">目前得分: <span id="running-score">0</span></span>
            </div>

            <!-- Progress bar fill -->
            <div class="progress-bar-container">
                <div id="progress-bar-fill"></div>
            </div>

            <!-- Question Area -->
            <div class="question-main-box">
                <!-- Circular Timer -->
                <div class="timer-container">
                    <svg class="timer-svg" viewBox="0 0 80 80">
                        <circle class="timer-bg" cx="40" cy="40" r="34"></circle>
                        <circle id="timer-fill" class="timer-fill" cx="40" cy="40" r="34"></circle>
                    </svg>
                    <div id="timer-text" class="timer-text">15</div>
                </div>

                <div id="question-text" class="question-text">載入問題中...</div>
            </div>

            <!-- Options (A, B, C, D) -->
            <div class="options-container">
                <button class="option-btn" data-option="A">
                    <span class="opt-label">A</span>
                    <span class="opt-text">選項 A</span>
                </button>
                <button class="option-btn" data-option="B">
                    <span class="opt-label">B</span>
                    <span class="opt-text">選項 B</span>
                </button>
                <button class="option-btn" data-option="C">
                    <span class="opt-label">C</span>
                    <span class="opt-text">選項 C</span>
                </button>
                <button class="option-btn" data-option="D">
                    <span class="opt-label">D</span>
                    <span class="opt-text">選項 D</span>
                </button>
            </div>
        </section>

        <!-- 3. Result View -->
        <section id="result-view" class="quiz-card hidden">
            <span class="theme-tag">🎉 挑戰結束</span>
            <h2 class="result-title">測驗結算</h2>

            <div class="score-card">
                <div class="score-label">您的最終得分</div>
                <div class="score-num"><span id="final-score">0</span> <span class="score-max">/ 100</span></div>
                <div id="evaluation-text" class="evaluation-text">測驗結算中...</div>
            </div>

            <!-- Save Score Form -->
            <div id="save-score-section" class="save-score-section hidden">
                <p>恭喜進入前五名！留下你的阿米暱稱吧：</p>
                <form id="save-score-form" class="save-score-form">
                    <input type="text" id="player-name" placeholder="輸入阿米暱稱..." required maxlength="10">
                    <button type="submit" class="btn-quiz-primary btn-save">登錄排行</button>
                </form>
            </div>

            <!-- Actions row -->
            <div class="actions-row">
                <button id="restart-btn" class="btn-quiz-primary">再試一次</button>
                <button id="menu-btn" class="btn-quiz-secondary">返回主畫面</button>
            </div>

            <!-- Detailed Question Review -->
            <div class="review-section">
                <h3>🔍 錯題與答案檢討</h3>
                <div id="review-list" class="review-list">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
