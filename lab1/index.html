<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Lab 1 - 極速猜歌王</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <a href="../index.html" class="back-btn">← 回到主頁</a>

    <div class="container">
        <header>
            <h1>🎵 Guess the Song</h1>
        </header>

        <main id="game-screen" class="game-card">
            <div class="stats">
                <div class="song-count">題目：<span id="song-num">1 / 5</span></div>
                <div class="timer">⏳ <span id="timer">15</span>s</div>
                <div class="score-container">得分：<span id="score" class="score">0</span></div>
            </div>

            <div class="progress-container">
                <div id="timer-bar"></div>
            </div>

            <div class="song-display">
                <div id="vinyl" class="vinyl-record"></div>
                <p>正在播放片段...</p>
            </div>

            <div id="options" class="options-grid">
                <!-- Buttons will be generated by JS -->
            </div>

            <div id="feedback" class="feedback"></div>
        </main>

        <section id="result-screen" class="game-card hidden">
            <h2>遊戲結束！</h2>
            <p>您的最終得分是：</p>
            <div id="final-score" class="final-score">0</div>
            <button id="restart-btn" class="restart-btn">再玩一次</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
